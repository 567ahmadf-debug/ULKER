kind = "web"
previewPath = "/"
title = "Ülker Digital Product Catalog"
version = "1.0.0"
id = "artifacts/ulker-catalog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22810

[services.development]
run = "pnpm --filter @workspace/ulker-catalog run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ulker-catalog", "run", "build" ]
publicDir = "artifacts/ulker-catalog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22810"
BASE_PATH = "/"
